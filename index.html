<script>
// ── Live data ─────────────────────────────────────────────────────
const LIVE_DATA_URL = 'https://raw.githubusercontent.com/rowlystudios-lgtm/yummy-wellness-tracker/main/data/daily.json';
let currentClaims = [];

function toScoreBand(scoreType, score) {
  if (scoreType === 'true'  || score >= 85) return 'green';
  if (scoreType === 'false' || score <  40) return 'red';
  return 'amber';
}

function mapLiveClaim(item) {
  const band   = toScoreBand(item.score_type, item.score);
  const border = item.score >= 85 ? '#1d9e75' : item.score >= 40 ? '#ef9f27' : '#e24b4a';
  return {
    rank:          item.rank,
    name:          item.claim,
    source:        item.platform || item.source || 'News',
    tag:           item.claim_tag || '',
    scoreVal:      item.score,
    scoreBand:     band,
    scoreLabel:    item.score_label || '',
    title:         item.claim,
    verdict:       item.verdict || '',
    science:       item.brit_take || (item.sources || []).join(' · '),
    scienceLabel:  item.brit_take ? '🇬🇧 Brit Take' : 'Science fact',
    consensusPos:  `${Math.min(item.score, 97)}%`,
    consensusBorder: border,
    sources:       item.sources || [],
    global_opinion: item.global_opinion || '',
    url:           item.url || '',
    hours_ago:     item.hours_ago || 24,
    isLive:        true,
  };
}

async function loadFeed() {
  let claimsToShow = FALLBACK_CLAIMS;
  try {
    const resp = await fetch(LIVE_DATA_URL + '?t=' + Date.now());
    if (resp.ok) {
      const data = await resp.json();
      if (data.top10 && data.top10.length > 0) {
        claimsToShow = data.top10.map(mapLiveClaim);
        // Update headline + live badge
        const tagline = document.querySelector('.page-tagline');
        if (tagline && data.week_headline) {
          const pub     = new Date(data.published);
          const dateStr = pub.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
          tagline.innerHTML = `${data.week_headline}&nbsp;·&nbsp;<span class="live-badge">LIVE</span> ${dateStr}`;
        }
        // Swap trending pills to real claim tags
        const tags = [...new Set(claimsToShow.map(c => c.tag).filter(Boolean))].slice(0, 6);
        if (tags.length) {
          const strip = document.querySelector('.trending-strip');
          const label = strip && strip.querySelector('.trend-label');
          if (strip) {
            strip.innerHTML = '';
            if (label) strip.appendChild(label);
            tags.forEach(t => {
              const btn = document.createElement('button');
              btn.className = 'trend-pill';
              btn.textContent = t;
              strip.appendChild(btn);
            });
            if (typeof initTrendingPills === 'function') initTrendingPills();
          }
        }
      }
    }
  } catch (e) {
    console.log('Using fallback data:', e.message);
  }
  currentClaims = claimsToShow;
  buildFeed(claimsToShow);
}

function buildFeed(claimsData) {
  const feed = document.getElementById('feed');
  feed.innerHTML = '';
  claimsData.forEach((c, i) => {
    const wrapper = document.createElement('div');
    wrapper.className = 'claim-wrapper';
    wrapper.style.animationDelay = `${i * 80}ms`;

    const row = document.createElement('div');
    row.className = 'topic-row';
    row.style.animationDelay = `${i * 80}ms`;
    row.innerHTML = `
      <div class="topic-rank">${c.rank}</div>
      <div class="topic-info">
        <div class="topic-name">${c.name}</div>
        <div class="topic-meta">
          <span class="meta-source">${c.source}</span>
          <span>·</span>
          <span>${c.tag}</span>
        </div>
      </div>
      <div class="topic-right">
        <div class="score-badge ${c.scoreBand}">
          <span class="score-number">${c.scoreVal}</span>
          <span class="score-label">${c.scoreLabel}</span>
        </div>
        <div class="chevron">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
      </div>
    `;

    const card = document.createElement('div');
    card.className = 'claim-card';
    card.innerHTML = `
      <div class="card-divider"></div>
      <div class="card-header-row">
        <div class="score-badge ${c.scoreBand}">
          <span class="score-number">${c.scoreVal}</span>
          <span class="score-label">${c.scoreLabel}</span>
        </div>
        <span class="claim-tag">${c.tag}</span>
      </div>
      <h2 class="claim-title">${c.title}</h2>
      <p class="verdict">${c.verdict}</p>
      <div class="science-box">
        <div class="science-label">Science fact</div>
        <p class="science-text">${c.science}</p>
      </div>
      <div class="card-footer">
        <span class="card-source">${c.source}</span>
        <button class="global-btn" onclick="openGlobal(currentClaims, ${i}); event.stopPropagation();">
          🌍 International opinions
        </button>
      </div>
    `;

    row.addEventListener('click', () => toggleCard(row, card));
    wrapper.appendChild(row);
    wrapper.appendChild(card);
    feed.appendChild(wrapper);
  });
}

document.addEventListener('DOMContentLoaded', async () => {
  await loadFeed();
  const params = new URLSearchParams(window.location.search);
  // Auto-expand first card if ?expand=1
  if (params.get('expand') === '1') {
    setTimeout(() => {
      const row  = document.querySelector('.topic-row');
      const card = document.querySelector('.claim-card');
      if (row && card) { row.classList.add('open'); card.classList.add('open'); }
    }, 150);
  }
  // Auto-open global panel if ?global=N
  const globalIdx = params.get('global');
  if (globalIdx !== null) {
    setTimeout(() => openGlobal(currentClaims, parseInt(globalIdx) || 0), 300);
  }
});
</script>
