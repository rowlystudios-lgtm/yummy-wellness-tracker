name: Daily Nutrition Claim Tracker — Global Edition

on:
  schedule:
    - cron: '45 10 * * *'  # 10:45 UTC = 5:45am EST
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — score but do not publish'
        required: false
        default: 'false'
      region:
        description: 'Score specific region only (leave blank for all)'
        required: false
        default: ''

env:
  SUPPORTED_REGIONS: 'US,GB,DE,JP,FR,BR,AU,IN,KR,ES'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  track-and-score:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Reddit (public JSON — no key needed)
        timeout-minutes: 5
        run: python scripts/fetch_reddit.py

      - name: Fetch GDELT global news (65 languages — no key needed)
        timeout-minutes: 5
        run: python scripts/fetch_gdelt.py

      - name: Fetch YouTube trending health videos
        timeout-minutes: 3
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/fetch_youtube.py

      - name: Fetch official RSS feeds (WHO, NHS, CDC — no key needed)
        timeout-minutes: 3
        run: python scripts/fetch_rss.py

      - name: Deduplicate and rank by region
        timeout-minutes: 2
        run: python scripts/deduplicate.py

      - name: Score with Claude AI — multilingual + regional
        timeout-minutes: 10
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/score_claims.py

      - name: Build regional JSON files + global cross-reference
        timeout-minutes: 2
        run: python scripts/build_json.py

      - name: Commit and push all output
        timeout-minutes: 2
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: python scripts/publish.py

      - name: Upload debug artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-output-${{ github.run_id }}
          path: data/
          retention-days: 7
